# Index of project learnings. Every learnings/<slug>.md file MUST have a
# corresponding entry below — entries without index rows are invisible to
# the retrieve-learnings.sh hook.
#
# Each entry:
#   - file: <slug>.md
#     triggers: "kw1 kw2 kw3 kw4"
#
# Triggers are whitespace-separated keywords (lowercased during matching).
# Choose 4–8 specific concrete keywords — variable names, dataset acronyms,
# country codes, year ranges. Avoid generic words ("data", "fix", "error",
# "wave") that produce false positives. Minimum 2 trigger matches required
# for a learning to surface.
#
# Example (uncomment + adapt when filing the first learning):
#
# learnings:
#   - file: pondii-eph-2014-vintage.md
#     triggers: "PONDII EPH 2014 panel attrition vintage"
#   - file: pwt-rgdpe-rgdpo-oil-exporters.md
#     triggers: "PWT rgdpe rgdpo oil productivity divergence"
#
# Format and discipline: .claude/conventions/learning-capture.md
# Rationale: docs/learning-capture-mechanism.md

learnings: []
